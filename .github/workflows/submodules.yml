name: Update gitsubmodules
on:
  workflow_dispatch:
permissions:
  contents: write
  # pull-requests: write # cannot be used with workflow_dispatch
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          submodules: recursive
      - name: "Submodule fetching (docs)"
        continue-on-error: true
        run: |
          git submodule update --init --recursive --remote -- "docs"
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'chore(docs): update submodule'
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          branch: sync-docs
          delete-branch: true
          title: 'Sync docs'
          body: |
            Update docs/ submodule to latest commit.

            _Auto-generated by [create-pull-request][1]_

            [1]: https://github.com/peter-evans/create-pull-request
          labels: |
            submodule
            automated
          assignees: ${{ github.repository_owner }}
          draft: false
      # - name: Auto approve
      #   if: steps.cpr.outputs.pull-request-operation == 'created'
      #   run: gh pr review --approve "${{ steps.cpr.outputs.pull-request-number }}"
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
